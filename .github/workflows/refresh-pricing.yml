name: Refresh pricing

# Keeps public/data/pricing.json current by pulling live token prices from the
# public OpenRouter models API once a day (and on demand). Commits only when
# something actually changed.

on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-pricing
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Pull live prices
        run: node scripts/refresh-pricing.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain public/data/pricing.json)" ]]; then
            git config user.name "trax-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/data/pricing.json
            git commit -m "chore(data): refresh pricing from OpenRouter [skip ci]"
            git push
          else
            echo "No pricing changes — nothing to commit."
          fi
